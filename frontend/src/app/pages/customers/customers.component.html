<div>
  <div class="flex justify-between items-center mb-6">
    <h1 [ngClass]="['text-2xl font-bold', (themeService.darkMode$ | async) ? 'text-white' : 'text-slate-800']">Customers</h1>
    <button (click)="form = {name:'', email:'', phone:'', status:'Active'}; editing = null; showForm = true"
      class="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
      <lucide-icon [img]="Plus" [size]="16"></lucide-icon> Add Customer
    </button>
  </div>

  <form *ngIf="showForm" (ngSubmit)="save()" [ngClass]="['p-4 rounded-lg shadow mb-6 grid grid-cols-2 gap-3', (themeService.darkMode$ | async) ? 'bg-slate-800 text-white' : 'bg-white text-slate-800']">
    <input placeholder="Name" [(ngModel)]="form.name" name="name" required
      [ngClass]="['px-3 py-2 border rounded-lg', (themeService.darkMode$ | async) ? 'bg-slate-700 border-slate-600 text-white' : 'border-slate-300']" />
    <input placeholder="Email" [(ngModel)]="form.email" name="email"
      [ngClass]="['px-3 py-2 border rounded-lg', (themeService.darkMode$ | async) ? 'bg-slate-700 border-slate-600 text-white' : 'border-slate-300']" />
    <input placeholder="Phone" [(ngModel)]="form.phone" name="phone"
      [ngClass]="['px-3 py-2 border rounded-lg', (themeService.darkMode$ | async) ? 'bg-slate-700 border-slate-600 text-white' : 'border-slate-300']" />
    
    <div class="col-span-2 flex gap-2">
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Save</button>
      <button type="button" (click)="showForm = false" class="px-4 py-2 rounded-lg border">Cancel</button>
    </div>
  </form>

  
  <!-- Loading Indicator -->
  <div *ngIf="isLoading" class="p-8 text-center text-blue-500 font-medium">
    Loading...
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage && !isLoading" class="p-8 text-center text-red-500">
    {{ errorMessage }}
  </div>

  <!-- No Data Message -->
  <div *ngIf="!isLoading && !errorMessage && customers.length === 0" class="p-8 text-center text-slate-500">
    No data found.
  </div>

  <div *ngIf="!isLoading && !errorMessage && customers.length > 0" [ngClass]="['rounded-lg shadow overflow-hidden', (themeService.darkMode$ | async) ? 'bg-slate-800 text-white' : 'bg-white text-slate-800']">
    <table class="w-full text-sm">
      <thead [ngClass]="(themeService.darkMode$ | async) ? 'bg-slate-700' : 'bg-slate-50'">
        <tr>
          <th class="px-4 py-3 text-left font-medium">Name</th>
          <th class="px-4 py-3 text-left font-medium">Email</th>
          <th class="px-4 py-3 text-left font-medium">Phone</th>
          <th class="px-4 py-3 text-left font-medium">Status</th>
          <th class="px-4 py-3 text-left font-medium"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of customers" [ngClass]="['border-t', (themeService.darkMode$ | async) ? 'border-slate-700' : 'border-slate-100']">
          <td class="px-4 py-3 font-medium">{{ c.name }}</td>
          <td class="px-4 py-3">{{ c.email }}</td>
          <td class="px-4 py-3">{{ c.phone }}</td>
          <td class="px-4 py-3"><span class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs">{{ c.status }}</span></td>
          <td class="px-4 py-3 flex gap-2">
            <button (click)="edit(c)" class="text-blue-500 hover:text-blue-700"><lucide-icon [img]="Pencil" [size]="15"></lucide-icon></button>
            <button (click)="remove(c.id)" class="text-red-500 hover:text-red-700"><lucide-icon [img]="Trash2" [size]="15"></lucide-icon></button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
