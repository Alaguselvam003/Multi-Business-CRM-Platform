<div>
  <div class="flex justify-between items-center mb-6">
    <h1 [ngClass]="['text-2xl font-bold', (themeService.darkMode$ | async) ? 'text-white' : 'text-slate-800']">Leads</h1>
    <button (click)="showForm = true" class="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
      <lucide-icon [img]="Plus" [size]="16"></lucide-icon> Add Lead
    </button>
  </div>

  <form *ngIf="showForm" (ngSubmit)="save()" [ngClass]="['p-4 rounded-lg shadow mb-6 grid grid-cols-2 gap-3', (themeService.darkMode$ | async) ? 'bg-slate-800 text-white' : 'bg-white text-slate-800']">
    <input placeholder="Name" [(ngModel)]="form.name" name="name" required
      [ngClass]="['px-3 py-2 border rounded-lg', (themeService.darkMode$ | async) ? 'bg-slate-700 border-slate-600 text-white' : 'border-slate-300']" />
    <input placeholder="Company" [(ngModel)]="form.company" name="company"
      [ngClass]="['px-3 py-2 border rounded-lg', (themeService.darkMode$ | async) ? 'bg-slate-700 border-slate-600 text-white' : 'border-slate-300']" />
    <input placeholder="Email" [(ngModel)]="form.email" name="email"
      [ngClass]="['px-3 py-2 border rounded-lg', (themeService.darkMode$ | async) ? 'bg-slate-700 border-slate-600 text-white' : 'border-slate-300']" />
    <input placeholder="Phone" [(ngModel)]="form.phone" name="phone"
      [ngClass]="['px-3 py-2 border rounded-lg', (themeService.darkMode$ | async) ? 'bg-slate-700 border-slate-600 text-white' : 'border-slate-300']" />
    <input placeholder="Value" [(ngModel)]="form.value" name="value"
      [ngClass]="['px-3 py-2 border rounded-lg', (themeService.darkMode$ | async) ? 'bg-slate-700 border-slate-600 text-white' : 'border-slate-300']" />
    
    <select [(ngModel)]="form.status" name="status"
      [ngClass]="['px-3 py-2 border rounded-lg', (themeService.darkMode$ | async) ? 'bg-slate-700 border-slate-600 text-white' : 'border-slate-300']">
      <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
    </select>

    <div class="col-span-2 flex gap-2">
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Save</button>
      <button type="button" (click)="showForm = false" class="px-4 py-2 rounded-lg border">Cancel</button>
    </div>
  </form>

  
  <!-- Loading Indicator -->
  <div *ngIf="isLoading" class="p-8 text-center text-blue-500 font-medium">
    Loading...
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage && !isLoading" class="p-8 text-center text-red-500">
    {{ errorMessage }}
  </div>

  <!-- No Data Message -->
  <div *ngIf="!isLoading && !errorMessage && leads.length === 0" class="p-8 text-center text-slate-500">
    No data found.
  </div>

  <div *ngIf="!isLoading && !errorMessage && leads.length > 0" [ngClass]="['rounded-lg shadow overflow-hidden', (themeService.darkMode$ | async) ? 'bg-slate-800 text-white' : 'bg-white text-slate-800']">
    <table class="w-full text-sm">
      <thead [ngClass]="(themeService.darkMode$ | async) ? 'bg-slate-700' : 'bg-slate-50'">
        <tr>
          <th class="px-4 py-3 text-left font-medium">Name</th>
          <th class="px-4 py-3 text-left font-medium">Company</th>
          <th class="px-4 py-3 text-left font-medium">Value</th>
          <th class="px-4 py-3 text-left font-medium">Status</th>
          <th class="px-4 py-3 text-left font-medium"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let l of leads" [ngClass]="['border-t', (themeService.darkMode$ | async) ? 'border-slate-700' : 'border-slate-100']">
          <td class="px-4 py-3 font-medium">{{ l.name }}</td>
          <td class="px-4 py-3">{{ l.company }}</td>
          <td class="px-4 py-3">{{ l.value }}</td>
          <td class="px-4 py-3"><span [ngClass]="['px-2 py-1 rounded text-xs', statusColor(l.status)]">{{ l.status }}</span></td>
          <td class="px-4 py-3"><button (click)="remove(l.id)" class="text-red-500 hover:text-red-700"><lucide-icon [img]="Trash2" [size]="15"></lucide-icon></button></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
