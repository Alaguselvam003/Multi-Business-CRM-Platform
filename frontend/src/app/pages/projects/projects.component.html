<div>
  <div class="flex justify-between items-center mb-6">
    <h1 [ngClass]="['text-2xl font-bold', (themeService.darkMode$ | async) ? 'text-white' : 'text-slate-800']">Projects</h1>
    <button (click)="showForm = true" class="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
      <lucide-icon [img]="Plus" [size]="16"></lucide-icon> New Project
    </button>
  </div>

  <form *ngIf="showForm" (ngSubmit)="save()" [ngClass]="['p-4 rounded-lg shadow mb-6 grid grid-cols-2 gap-3', (themeService.darkMode$ | async) ? 'bg-slate-800 text-white' : 'bg-white text-slate-800']">
    <input placeholder="Project Name" [(ngModel)]="form.name" name="name" required
      [ngClass]="['col-span-2 px-3 py-2 border rounded-lg', (themeService.darkMode$ | async) ? 'bg-slate-700 border-slate-600 text-white' : 'border-slate-300']" />
    <input placeholder="Description" [(ngModel)]="form.description" name="description"
      [ngClass]="['col-span-2 px-3 py-2 border rounded-lg', (themeService.darkMode$ | async) ? 'bg-slate-700 border-slate-600 text-white' : 'border-slate-300']" />
    
    <select [(ngModel)]="form.status" name="status"
      [ngClass]="['px-3 py-2 border rounded-lg', (themeService.darkMode$ | async) ? 'bg-slate-700 border-slate-600 text-white' : 'border-slate-300']">
      <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
    </select>
    
    <input type="number" placeholder="Progress %" min="0" max="100" [(ngModel)]="form.progress" name="progress"
      [ngClass]="['px-3 py-2 border rounded-lg', (themeService.darkMode$ | async) ? 'bg-slate-700 border-slate-600 text-white' : 'border-slate-300']" />
    <input type="date" [(ngModel)]="form.start_date" name="start_date"
      [ngClass]="['px-3 py-2 border rounded-lg', (themeService.darkMode$ | async) ? 'bg-slate-700 border-slate-600 text-white' : 'border-slate-300']" />
    <input type="date" [(ngModel)]="form.end_date" name="end_date"
      [ngClass]="['px-3 py-2 border rounded-lg', (themeService.darkMode$ | async) ? 'bg-slate-700 border-slate-600 text-white' : 'border-slate-300']" />

    <div class="col-span-2 flex gap-2">
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Save</button>
      <button type="button" (click)="showForm = false" class="px-4 py-2 rounded-lg border">Cancel</button>
    </div>
  </form>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div *ngFor="let p of projects" [ngClass]="['p-4 rounded-lg shadow', (themeService.darkMode$ | async) ? 'bg-slate-800 text-white' : 'bg-white text-slate-800']">
      <div class="flex justify-between items-start">
        <h3 class="font-semibold">{{ p.name }}</h3>
        <span [ngClass]="['px-2 py-1 rounded text-xs', statusColor(p.status)]">{{ p.status }}</span>
      </div>
      <p [ngClass]="['text-sm mt-1', (themeService.darkMode$ | async) ? 'text-slate-400' : 'text-slate-500']">{{ p.description }}</p>
      <div class="mt-3">
        <div class="flex justify-between text-xs mb-1">
          <span>Progress</span><span>{{ p.progress }}%</span>
        </div>
        <div class="w-full bg-slate-200 rounded-full h-2">
          <div class="bg-blue-600 h-2 rounded-full" [style.width]="p.progress + '%'"></div>
        </div>
      </div>
    </div>
  </div>
</div>
