<div [ngClass]="['min-h-screen flex items-center justify-center', darkMode ? 'bg-slate-900' : 'bg-gradient-to-br from-blue-50 to-indigo-100']">
  <div [ngClass]="['p-8 rounded-lg shadow-2xl w-[28rem]', darkMode ? 'bg-slate-800' : 'bg-white']">
    <h1 [ngClass]="['text-3xl font-bold text-center mb-2', darkMode ? 'text-white' : 'text-slate-900']">
      Create Account
    </h1>
    <p [ngClass]="['text-center mb-6', darkMode ? 'text-slate-400' : 'text-slate-600']">
      Join ZENJADE CRM PRO today
    </p>

    <!-- Toggle Registration Type -->
    <div class="flex p-1 mb-6 space-x-1 bg-slate-100 rounded-xl" [ngClass]="{'bg-slate-700': darkMode}">
      <button (click)="registerType = 'company'" 
        [ngClass]="registerType === 'company' ? 'bg-white shadow text-slate-900' : 'text-slate-500 hover:text-slate-700'"
        class="w-full rounded-lg py-2 text-sm font-medium leading-5 transition-all duration-200 focus:outline-none">
        Register Company
      </button>
      <button (click)="registerType = 'employee'"
        [ngClass]="registerType === 'employee' ? 'bg-white shadow text-slate-900' : 'text-slate-500 hover:text-slate-700'"
        class="w-full rounded-lg py-2 text-sm font-medium leading-5 transition-all duration-200 focus:outline-none">
        Register Employee
      </button>
    </div>

    <div *ngIf="error" class="bg-red-100 text-red-700 p-3 rounded mb-4 text-sm">
      {{ error }}
    </div>
    <div *ngIf="success" class="bg-green-100 text-green-700 p-3 rounded mb-4 text-sm">
      {{ success }}
    </div>

    <form (ngSubmit)="handleRegister()" class="space-y-4">
      <input type="text" placeholder="Full Name" [(ngModel)]="name" name="name" 
        [ngClass]="['w-full px-4 py-2 border rounded-lg', darkMode ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-slate-300']" required />
      
      <input *ngIf="registerType === 'company'" type="text" placeholder="Company Name" [(ngModel)]="companyName" name="companyName" 
        [ngClass]="['w-full px-4 py-2 border rounded-lg', darkMode ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-slate-300']" required />
      
      <div *ngIf="registerType === 'employee'" class="grid grid-cols-2 gap-4">
        <input type="text" placeholder="Department" [(ngModel)]="department" name="department" 
          [ngClass]="['w-full px-4 py-2 border rounded-lg', darkMode ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-slate-300']" required />
        <select [(ngModel)]="role" name="role" [ngClass]="['w-full px-4 py-2 border rounded-lg', darkMode ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-slate-300']" required>
          <option value="Employee">Employee</option>
          <option value="Manager">Manager</option>
          <option value="Sales Executive">Sales Executive</option>
          <option value="Support Executive">Support Executive</option>
        </select>
      </div>

      <input type="email" placeholder="Email Address" [(ngModel)]="email" name="email" 
        [ngClass]="['w-full px-4 py-2 border rounded-lg', darkMode ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-slate-300']" required />
      
      <input type="password" placeholder="Password" [(ngModel)]="password" name="password" 
        [ngClass]="['w-full px-4 py-2 border rounded-lg', darkMode ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-slate-300']" required />
      
      <button type="submit" [disabled]="loading"
        class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition disabled:opacity-50 mt-4">
        {{ loading ? 'Processing...' : 'Register' }}
      </button>
    </form>
    
    <p class="mt-6 text-center text-sm" [ngClass]="darkMode ? 'text-slate-400' : 'text-slate-600'">
      Already have an account? 
      <a href="javascript:void(0)" (click)="goToLogin()" class="text-blue-600 font-medium hover:underline">Login here</a>
    </p>
  </div>
</div>
