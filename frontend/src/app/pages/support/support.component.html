<div>
  <div class="flex justify-between items-center mb-6">
    <h1 [ngClass]="['text-2xl font-bold', (themeService.darkMode$ | async) ? 'text-white' : 'text-slate-800']">Support Tickets</h1>
    <button (click)="showForm = true" class="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
      <lucide-icon [img]="Plus" [size]="16"></lucide-icon> New Ticket
    </button>
  </div>

  <form *ngIf="showForm" (ngSubmit)="save()" [ngClass]="['p-4 rounded-lg shadow mb-6 grid grid-cols-2 gap-3', (themeService.darkMode$ | async) ? 'bg-slate-800 text-white' : 'bg-white text-slate-800']">
    <input placeholder="Title" [(ngModel)]="form.title" name="title" required
      [ngClass]="['col-span-2 px-3 py-2 border rounded-lg', (themeService.darkMode$ | async) ? 'bg-slate-700 border-slate-600 text-white' : 'border-slate-300']" />
    <input placeholder="Description" [(ngModel)]="form.description" name="description"
      [ngClass]="['col-span-2 px-3 py-2 border rounded-lg', (themeService.darkMode$ | async) ? 'bg-slate-700 border-slate-600 text-white' : 'border-slate-300']" />
    
    <select [(ngModel)]="form.priority" name="priority"
      [ngClass]="['px-3 py-2 border rounded-lg', (themeService.darkMode$ | async) ? 'bg-slate-700 border-slate-600 text-white' : 'border-slate-300']">
      <option *ngFor="let p of priorities" [value]="p">{{ p }}</option>
    </select>

    <div class="col-span-2 flex gap-2">
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Save</button>
      <button type="button" (click)="showForm = false" class="px-4 py-2 rounded-lg border">Cancel</button>
    </div>
  </form>

  <div class="space-y-3">
    <div *ngFor="let t of tickets" [ngClass]="['p-4 rounded-lg shadow flex justify-between items-center', (themeService.darkMode$ | async) ? 'bg-slate-800 text-white' : 'bg-white text-slate-800']">
      <div>
        <p class="font-medium">{{ t.title }}</p>
        <p [ngClass]="['text-xs mt-1', (themeService.darkMode$ | async) ? 'text-slate-400' : 'text-slate-500']">{{ t.description }}</p>
      </div>
      <span [ngClass]="['px-2 py-1 rounded text-xs', priorityColor(t.priority)]">{{ t.priority }}</span>
    </div>
  </div>
</div>
